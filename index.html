<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8551388789946009" crossorigin="anonymous"></script>
<title>어서와 여행은 처음이지? — 도시별 숙소 가격 지도</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0e1a;
  --card-bg:#111827;
  --card-border:#1a2740;
  --accent:#f97316;
  --accent2:#6366f1;
  --text:#eef2f8;
  --muted:#8a9bb5;
  --muted2:#4a5f78;
  --glow:rgba(249,115,22,.18);
  --font:'Noto Sans KR',-apple-system,'Malgun Gothic',sans-serif;
}
html,body{
  height:100%;
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1a2740;border-radius:4px}

/* ── HERO ── */
.hero{
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  padding:60px 20px 0;
  position:relative;
  overflow:hidden;
}
.hero::before{
  content:'';
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 50% -5%,  rgba(99,102,241,.18) 0%, transparent 70%),
    radial-gradient(ellipse 40% 35% at 85% 75%,  rgba(249,115,22,.10) 0%, transparent 60%),
    radial-gradient(ellipse 35% 28% at 8%  55%,  rgba(6,182,212,.08)  0%, transparent 60%);
  pointer-events:none;
}

/* hero badge */
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(99,102,241,.12);
  border:1px solid rgba(99,102,241,.28);
  border-radius:100px;
  padding:5px 14px;
  font-size:.7rem;font-weight:700;
  color:#a5b4fc;
  letter-spacing:.07em;text-transform:uppercase;
  margin-bottom:32px;
}
.hero-badge .dot{animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.hero-eyebrow{
  font-size:clamp(.95rem,2.5vw,1.2rem);
  font-weight:700;color:var(--accent);
  letter-spacing:.03em;margin-bottom:14px;
}
.hero-title{
  font-size:clamp(2rem,5.5vw,3.6rem);
  font-weight:900;line-height:1.1;
  letter-spacing:-.025em;
  margin-bottom:18px;
}
.hero-title .hl{
  background:linear-gradient(135deg,#f97316 0%,#fb923c 45%,#fbbf24 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-desc{
  font-size:clamp(.88rem,1.8vw,1rem);
  color:var(--muted);
  max-width:520px;
  line-height:1.9;
  margin-bottom:12px;
}
.hero-desc strong{color:var(--text);font-weight:700}
.hero-cta-hint{
  font-size:.75rem;color:var(--muted2);
  display:flex;align-items:center;gap:8px;
  margin-bottom:52px;
  width:100%;max-width:380px;
}
.hero-cta-hint::before,
.hero-cta-hint::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(to right,transparent,rgba(74,95,120,.3));
}
.hero-cta-hint::after{
  background:linear-gradient(to left,transparent,rgba(74,95,120,.3));
}

/* ── SECTION ── */
.section{
  max-width:1080px;
  width:100%;
  margin:0 auto;
  padding:0 20px 80px;
}
.section-label{
  font-size:.67rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.1em;
  color:var(--muted2);
  margin-bottom:24px;
  display:flex;align-items:center;gap:10px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--card-border)}

/* ── CITY GRID ── */
.city-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:14px;
}

/* ── CITY CARD ── */
.city-card{
  position:relative;
  background:var(--card-bg);
  border:1.5px solid var(--card-border);
  border-radius:20px;
  padding:26px 14px 20px;
  text-align:center;
  cursor:pointer;
  transition:transform .2s cubic-bezier(.25,.8,.25,1), box-shadow .2s, border-color .2s;
  user-select:none;
  text-decoration:none;
  display:block;
  overflow:hidden;
}
.city-card::before{
  content:'';
  position:absolute;inset:0;
  border-radius:20px;
  background:radial-gradient(circle at 50% 0%, var(--c-glow,rgba(99,102,241,.1)) 0%, transparent 65%);
  opacity:0;
  transition:opacity .28s;
}
.city-card:hover::before{opacity:1}
.city-card:hover{
  transform:translateY(-5px) scale(1.015);
  border-color:var(--c-color, var(--accent2));
  box-shadow:0 14px 36px rgba(0,0,0,.45), 0 0 0 1px var(--c-color,var(--accent2));
}
.city-card.available:hover{
  box-shadow:0 14px 36px rgba(0,0,0,.45), 0 0 20px var(--c-glow, var(--glow));
}

/* available accent border */
.city-card.available{
  border-color:color-mix(in srgb, var(--c-color, #f97316) 28%, transparent);
}
.city-card.available .city-picto{
  background:color-mix(in srgb, var(--c-color, #f97316) 10%, transparent);
  border-color:color-mix(in srgb, var(--c-color, #f97316) 35%, transparent);
}

/* picto */
.city-picto{
  width:64px;height:64px;
  border-radius:16px;
  background:rgba(99,102,241,.1);
  border:1.5px solid rgba(99,102,241,.25);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 14px;
  font-size:2rem;
  transition:transform .2s, box-shadow .2s;
}
.city-card:hover .city-picto{
  transform:scale(1.1) rotate(-4deg);
  box-shadow:0 6px 20px var(--c-glow, rgba(99,102,241,.22));
}

.city-name-ko{
  font-size:1.05rem;font-weight:900;
  color:var(--text);
  margin-bottom:2px;
  letter-spacing:-.01em;
}
.city-name-en{
  font-size:.64rem;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;
  color:var(--c-color, var(--muted));
  margin-bottom:6px;
}
.city-tagline{
  font-size:.61rem;
  color:var(--muted2);
  line-height:1.55;
  margin-bottom:8px;
  letter-spacing:-.005em;
}
.city-card.available .city-tagline{
  color:var(--muted);
}
.city-country{
  font-size:.6rem;color:var(--muted2);
  display:flex;align-items:center;justify-content:center;gap:3px;
}

/* badge */
.city-badge{
  position:absolute;top:10px;right:10px;
  font-size:.56rem;font-weight:700;
  letter-spacing:.05em;text-transform:uppercase;
  padding:2px 8px;border-radius:100px;
}
.badge-live{
  background:rgba(34,197,94,.12);
  color:#4ade80;
  border:1px solid rgba(34,197,94,.25);
}
.badge-soon{
  background:rgba(255,255,255,.04);
  color:var(--muted2);
  border:1px solid rgba(255,255,255,.07);
}

/* dim soon cards */
.city-card.soon{
  opacity:.65;
  cursor:default;
  pointer-events:none;
}
.city-card.soon:hover{
  opacity:.78;
  transform:translateY(-2px);
  pointer-events:auto;
  cursor:not-allowed;
}

/* ── FOOTER ── */
.footer{
  text-align:center;
  padding:28px 20px;
  border-top:1px solid var(--card-border);
  font-size:.65rem;
  color:var(--muted2);
  line-height:2.2;
}
.footer a{color:var(--muted2);text-decoration:none}
.footer a:hover{color:var(--muted)}

/* ── MOBILE ── */
@media(max-width:600px){
  .city-grid{grid-template-columns:repeat(2,1fr)}
  .hero-title{font-size:2rem}
  .hero-badge{font-size:.65rem}
}
</style>
</head>
<body>

<!-- ── HERO ── -->
<section class="hero">
  <div class="hero-badge">
    <span class="dot">●</span>&nbsp; LIVE — 도쿄 · 오사카 · 서울
  </div>
  <div class="hero-eyebrow">어서와, 여행은 처음이지?</div>
  <h1 class="hero-title">
    숙소는<br>
    <span class="hl">어디로 할 거야?</span>
  </h1>
  <p class="hero-desc">
    도시 지도를 한눈에 보고<br>
    <strong>동선과 숙소 위치</strong>를 똑똑하게 결정해봐
  </p>
  <div class="hero-cta-hint">도시를 선택하면 숙소 가격 지도가 열려요</div>

  <div class="section">
    <div class="section-label">도시 선택 · Choose a City</div>
    <div class="city-grid" id="city-grid"></div>
  </div>
</section>

<footer class="footer">
  <div>숙박 가격은 Booking.com 평균 기준 · 실제 가격은 시즌·조건에 따라 다를 수 있습니다</div>
  <div style="margin-top:4px">© 2025 여행 숙소 가격 지도 · Made with ❤️ for first-time travelers</div>
</footer>

<script src="shared/city-registry.js"></script>
<script>
const CITIES = window.CITY_REGISTRY.map(c => ({
  id:        c.id,
  ko:        c.ko,
  en:        c.en,
  country:   c.country.flag + ' ' + c.country.ko,
  emoji:     c.emoji,
  color:     c.color,
  glow:      c.glow,
  bg:        c.bg,
  url:       c.status === 'live' ? c.file : null,
  available: c.status === 'live',
  tagline:   c.tagline.ko,
}));

function buildGrid(){
  const grid = document.getElementById('city-grid');
  grid.innerHTML = CITIES.map(c => {
    const tag   = c.available ? 'a' : 'div';
    const href  = c.available && c.url ? `href="${c.url}"` : '';
    const cls   = c.available ? 'city-card available' : 'city-card soon';
    const badge = c.available
      ? `<span class="city-badge badge-live">● LIVE</span>`
      : `<span class="city-badge badge-soon">준비중</span>`;
    return `
      <${tag} class="${cls}" ${href}
        style="--c-color:${c.color};--c-glow:${c.glow};--c-bg:${c.bg};">
        ${badge}
        <div class="city-picto">${c.emoji}</div>
        <div class="city-name-ko">${c.ko}</div>
        <div class="city-name-en">${c.en}</div>
        <div class="city-tagline">${c.tagline}</div>
        <div class="city-country">${c.country}</div>
      </${tag}>`;
  }).join('');
}

buildGrid();
</script>
</body>
</html>
