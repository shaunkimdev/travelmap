<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오사카 숙박 가격 지도 | Osaka Accommodation Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,1,0"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--panel:#f8f9fa;--card:#f1f3f5;
  --border:#e5e7eb;--accent:#e74c3c;
  --text:#1a1a2e;--muted:#6b7280;
  --shadow:0 2px 12px rgba(0,0,0,.08);
}
body{
  font-family:-apple-system,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
  background:var(--bg);color:var(--text);
  height:100dvh;display:flex;flex-direction:column;overflow:hidden;
}
header{
  height:62px;background:var(--bg);border-bottom:2px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:14px;
  flex-shrink:0;z-index:1000;box-shadow:var(--shadow);
}
.h-logo{font-size:1.8rem;line-height:1}
.h-title{font-size:1.08rem;font-weight:800;color:var(--text);white-space:nowrap}
.h-sub{font-size:0.67rem;color:var(--muted);margin-top:2px}
.h-divider{width:1px;height:28px;background:var(--border);flex-shrink:0}
.h-hint{font-size:0.67rem;color:var(--muted);line-height:1.7}
.h-controls{margin-left:auto;display:flex;gap:8px;align-items:center}
.toggle-group{display:flex;background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.tg-btn{padding:5px 12px;font-size:0.76rem;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;font-weight:500}
.tg-btn.active{background:var(--accent);color:#fff;font-weight:700}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{
  width:262px;background:var(--bg);border-right:2px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;
  box-shadow:2px 0 8px rgba(0,0,0,.04);
}
.sec{padding:14px 15px;border-bottom:1px solid var(--border)}
.sec-title{
  font-size:0.67rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:var(--muted);margin-bottom:10px;
  display:flex;align-items:center;gap:6px;
}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.type-btn{
  background:var(--card);border:2px solid transparent;border-radius:10px;
  padding:10px 5px 8px;cursor:pointer;transition:all .2s;
  text-align:center;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:4px;
}
.type-btn:hover{border-color:var(--border);color:var(--text);background:#fff;box-shadow:var(--shadow)}
.type-btn.active{border-color:var(--accent);color:var(--accent);background:#fff5f5;box-shadow:0 2px 8px rgba(231,76,60,.15)}
.t-picto{
  width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  border-radius:10px;background:var(--card);transition:all .2s;
}
.type-btn.active .t-picto{background:rgba(231,76,60,.1)}
.t-picto .material-symbols-outlined{font-size:28px}
.t-name{font-size:0.71rem;font-weight:700;line-height:1.3}
.t-range{font-size:0.6rem;color:var(--muted)}
.type-btn.active .t-range{color:var(--accent)}
.leg-bar{height:14px;border-radius:8px;background:linear-gradient(to right,#2ecc71,#f1c40f,#e67e22,#e74c3c,#8e44ad);margin-bottom:7px}
.leg-labels{display:flex;justify-content:space-between;font-size:.61rem;color:var(--muted)}
.leg-items{margin-top:9px;display:flex;flex-direction:column;gap:5px}
.leg-row{display:flex;align-items:center;gap:8px;font-size:.72rem;color:var(--muted)}
.leg-dot{width:13px;height:13px;border-radius:3px;flex-shrink:0}
.notes{list-style:none;font-size:.7rem;color:var(--muted);line-height:2}
.notes li::before{content:'• ';color:var(--accent)}
.area-count{margin-left:auto;font-size:.63rem;background:var(--card);border:1px solid var(--border);padding:2px 8px;border-radius:10px;color:var(--muted)}
#map{flex:1}
.leaflet-popup-content-wrapper{border-radius:14px!important;padding:0!important;box-shadow:0 12px 40px rgba(0,0,0,.16)!important;border:1px solid #eee!important}
.leaflet-popup-content{margin:0!important;padding:16px!important}
.leaflet-popup-tip-container{display:none}
.pu-wrap{font-family:-apple-system,'Malgun Gothic',sans-serif;min-width:260px}
.pu-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.pu-picto{width:50px;height:50px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pu-picto .material-symbols-outlined{font-size:30px;color:#fff}
.pu-name{font-weight:800;font-size:1rem;color:#1a1a2e}
.pu-sub{font-size:.67rem;color:#999;margin-top:2px}
.pu-badge{display:inline-block;background:#f39c12;color:#fff;font-size:.58rem;padding:1px 6px;border-radius:10px;font-weight:700;vertical-align:middle;margin-left:4px}
.pu-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:9px}
.pu-tag{background:#f0f4f8;color:#444;padding:2px 8px;border-radius:10px;font-size:.66rem}
.pu-table{border:1px solid #eee;border-radius:10px;overflow:hidden;margin-bottom:10px}
.pu-row{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-bottom:1px solid #f5f5f5;font-size:.76rem}
.pu-row:last-child{border-bottom:none}
.pu-row.pu-active{background:#fff5f5}
.pu-label{color:#555;display:flex;align-items:center;gap:5px}
.pu-val{font-weight:800;color:#e74c3c}
.pu-na{font-weight:400;color:#ccc;font-size:.7rem}
.pu-night{font-size:.61rem;color:#ccc;font-weight:400}
.pu-btns{display:flex;gap:6px}
.pu-btn{flex:1;padding:8px;border:none;border-radius:8px;font-size:.73rem;font-weight:700;cursor:pointer;text-decoration:none;text-align:center;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px}
.pu-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
.pu-google{background:#4285f4;color:#fff}
.pu-booking{background:#003580;color:#fff}
.area-label{
  background:rgba(255,255,255,.95);border:2.5px solid transparent;border-radius:18px;
  padding:9px 16px 8px;font-family:-apple-system,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
  color:#1a1a2e;white-space:nowrap;cursor:grab;
  transition:all .22s cubic-bezier(.25,.8,.25,1);
  box-shadow:0 3px 14px rgba(0,0,0,.16);backdrop-filter:blur(6px);
  pointer-events:auto;text-align:center;user-select:none;
}
.area-label:active{cursor:grabbing}
.area-label:hover{transform:scale(1.07);box-shadow:0 7px 24px rgba(0,0,0,.24)}
.al-icons{display:flex;gap:8px;justify-content:center;margin-bottom:6px}
.al-icons .material-symbols-outlined{font-size:36px;transition:transform .2s}
.area-label:hover .al-icons .material-symbols-outlined{transform:scale(1.15)}
.al-name{font-size:28px;font-weight:900;line-height:1.1;letter-spacing:-.02em}
.al-tagline{font-size:11.5px;color:#555;margin-top:5px;font-weight:500;letter-spacing:-.01em;line-height:1.4;white-space:normal;max-width:200px;word-break:keep-all}
.subway-tip{background:rgba(15,15,15,.82);border:none!important;color:#fff;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:7px;box-shadow:0 2px 8px rgba(0,0,0,.4);white-space:nowrap}
.subway-tip::before{display:none!important}
.sl-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.sl-item:last-child{border-bottom:none}
.sl-swatch{width:30px;height:8px;border-radius:4px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.18)}
.sl-name{flex:1;font-size:.69rem;font-weight:600;color:var(--text);line-height:1.25}
.sl-org{font-size:.59rem;font-weight:400;color:var(--muted);margin-top:1px;display:block}
@media(max-width:768px){
  .main{flex-direction:column-reverse}
  .sidebar{width:100%;max-height:44vh}
  #map{min-height:56vh}
  .h-sub,.h-hint{display:none}
}
</style>
</head>
<body>
<header>
  <span class="h-logo">🏯</span>
  <div>
    <div class="h-title" id="h-title">오사카 숙박 가격 지도</div>
    <div class="h-sub" id="h-sub">위치별 평균 숙박 요금 · Booking.com 기준</div>
  </div>
  <div class="h-divider"></div>
  <div class="h-hint" id="h-hint">지역 클릭 → 상세 가격 확인<br>★ = 추천 숙박지</div>
  <div class="h-controls">
    <div class="toggle-group">
      <button class="tg-btn active" id="lang-ko" onclick="setLang('ko')">한국어</button>
      <button class="tg-btn" id="lang-en" onclick="setLang('en')">EN</button>
      <button class="tg-btn" id="lang-ja" onclick="setLang('ja')">日本語</button>
    </div>
    <div class="toggle-group">
      <button class="tg-btn active" id="btn-jpy" onclick="setCur('JPY')">¥ JPY</button>
      <button class="tg-btn" id="btn-krw" onclick="setCur('KRW')">₩ KRW</button>
      <button class="tg-btn" id="btn-usd" onclick="setCur('USD')">$ USD</button>
    </div>
  </div>
</header>
<div class="main">
  <div class="sidebar">
    <div class="sec">
      <div class="sec-title"><span id="sec-type">숙박 유형 선택</span><span class="area-count" id="area-count">12개 지역</span></div>
      <div class="type-grid">
        <button class="type-btn active" onclick="setType('capsule')" id="tab-capsule">
          <div class="t-picto"><span class="material-symbols-outlined">bedroom_parent</span></div>
          <span class="t-name" id="tn-capsule">캡슐호텔</span>
          <span class="t-range" id="tr-capsule"></span>
        </button>
        <button class="type-btn" onclick="setType('hostel')" id="tab-hostel">
          <div class="t-picto"><span class="material-symbols-outlined">backpack</span></div>
          <span class="t-name" id="tn-hostel">호스텔/게하</span>
          <span class="t-range" id="tr-hostel"></span>
        </button>
        <button class="type-btn" onclick="setType('budget')" id="tab-budget">
          <div class="t-picto"><span class="material-symbols-outlined">apartment</span></div>
          <span class="t-name" id="tn-budget">비즈니스 ★★</span>
          <span class="t-range" id="tr-budget"></span>
        </button>
        <button class="type-btn" onclick="setType('standard')" id="tab-standard">
          <div class="t-picto"><span class="material-symbols-outlined">hotel</span></div>
          <span class="t-name" id="tn-standard">스탠다드 ★★★</span>
          <span class="t-range" id="tr-standard"></span>
        </button>
        <button class="type-btn" onclick="setType('premium')" id="tab-premium">
          <div class="t-picto"><span class="material-symbols-outlined">star</span></div>
          <span class="t-name" id="tn-premium">프리미엄 ★★★★</span>
          <span class="t-range" id="tr-premium"></span>
        </button>
        <button class="type-btn" onclick="setType('luxury')" id="tab-luxury">
          <div class="t-picto"><span class="material-symbols-outlined">diamond</span></div>
          <span class="t-name" id="tn-luxury">럭셔리 ★★★★★</span>
          <span class="t-range" id="tr-luxury"></span>
        </button>
      </div>
    </div>
    <div class="sec">
      <div class="sec-title" id="sec-legend">가격 색상 기준</div>
      <div class="leg-bar"></div>
      <div class="leg-labels">
        <span id="ll0">저렴</span><span id="ll1">보통</span>
        <span id="ll2">비쌈</span><span id="ll3">고급</span>
      </div>
      <div class="leg-items">
        <div class="leg-row"><div class="leg-dot" style="background:#2ecc71"></div><span id="lc0">매우 저렴</span></div>
        <div class="leg-row"><div class="leg-dot" style="background:#27ae60"></div><span id="lc1">저렴</span></div>
        <div class="leg-row"><div class="leg-dot" style="background:#f1c40f"></div><span id="lc2">보통</span></div>
        <div class="leg-row"><div class="leg-dot" style="background:#e67e22"></div><span id="lc3">약간 비쌈</span></div>
        <div class="leg-row"><div class="leg-dot" style="background:#e74c3c"></div><span id="lc4">비쌈</span></div>
        <div class="leg-row"><div class="leg-dot" style="background:#8e44ad"></div><span id="lc5">럭셔리</span></div>
      </div>
    </div>
    <div class="sec">
      <div class="sec-title" id="sec-notes">안내사항</div>
      <ul class="notes">
        <li id="nt0">절대적인 수치 아님 (참고용)</li>
        <li id="nt1">Booking.com 평균가 기준</li>
        <li id="nt2">성수기·이벤트 시 변동 큼</li>

        <li id="nt4">최종 업데이트 2024/08</li>
      </ul>
    </div>
    <div class="sec">
      <div class="sec-title" id="sec-subway">🚇 지하철 노선</div>
      <div id="subway-list"></div>
    </div>
  </div>
  <div id="map"></div>
</div>

// CONFIG  (prices in JPY)
// ══════════════════════════════════════════
const THRESH = [3500, 7000, 13000, 20000, 32000];
const COLORS  = ['#2ecc71','#27ae60','#f1c40f','#e67e22','#e74c3c','#8e44ad'];

let currentLang     = 'ko';
let currentType     = 'capsule';
let currentCurrency = 'JPY';

const EX  = {JPY:1, KRW:9.5, USD:0.0067};
const SYM = {JPY:'¥', KRW:'₩', USD:'$'};

function fmt(jpy){
  if(jpy === null || jpy === undefined) return '—';
  const v = Math.round(jpy * EX[currentCurrency]);
  const s = SYM[currentCurrency];
  return s + v.toLocaleString();
}

function getColor(price){
  if(price === null) return '#cccccc';
  for(let i=0;i<THRESH.length;i++) if(price<THRESH[i]) return COLORS[i];
  return COLORS[5];
}

// TYPE RANGES (JPY 기준)
// ══════════════════════════════════════════
const TYPE_RANGES_JPY = {
  capsule:  [2500,  5000],
  hostel:   [3000,  5500],
  budget:   [7000,  12000],
  standard: [13000, 22000],
  premium:  [25000, 45000],
  luxury:   [60000, null],
};

function fmtRangeVal(jpy){
  const v = jpy * EX[currentCurrency];
  if(currentCurrency === 'JPY') return SYM.JPY + Math.round(v).toLocaleString();
  if(currentCurrency === 'KRW') return SYM.KRW + Math.round(v/1000).toLocaleString() + 'k';
  return SYM.USD + Math.round(v).toLocaleString();
}

function updateTypeRanges(){
  Object.entries(TYPE_RANGES_JPY).forEach(([type,[min,max]])=>{
    const el = document.getElementById('tr-'+type);
    if(!el) return;
    el.textContent = max === null ? fmtRangeVal(min) + '+' : fmtRangeVal(min) + '~' + fmtRangeVal(max);
  });
}

function makeIcon(area, color){
  const html = `
    <div style="width:52px;height:52px;border-radius:50%;background:${color};border:3px solid #fff;
      box-shadow:0 3px 14px rgba(0,0,0,.28);display:flex;align-items:center;justify-content:center;
      position:relative;cursor:pointer;">
      <span class="material-symbols-outlined" style="font-size:26px;color:#fff;">directions_subway</span>
      ${area.rec?`<div style="position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:#f39c12;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;font-weight:900;">★</div>`:''}
    </div>`;
  return L.divIcon({html, className:'', iconSize:[52,52], iconAnchor:[26,26], popupAnchor:[0,-30]});
}

// ══════════════════════════════════════════
// AREA LABEL
// ══════════════════════════════════════════
const LABEL_AREAS = Object.keys(LABEL_OFFSETS);

function hoverArea(id){
  const bc = baseCircles[id]; const c = AREA_COLORS[id]||'#e74c3c';
  if(bc) bc.setStyle({fillOpacity:.62,opacity:1,weight:3.5,color:c,fillColor:c});
}
function unhoverArea(id){
  const bc = baseCircles[id]; const c = AREA_COLORS[id]||'#e74c3c';
  if(bc) bc.setStyle({fillOpacity:.28,opacity:.82,weight:2.5,color:c,fillColor:c});
}

function makeAreaLabel(area, dir){
  const meta   = AREA_META[area.id] || {};
  const aColor = AREA_COLORS[area.id] || '#e74c3c';
  const name   = area[currentLang] || area.ko;
  const tag    = currentLang==='ko'?meta.tagKo : currentLang==='en'?meta.tagEn : meta.tagJa;
  const iconList = (meta.icons || [area.icon]).slice(0, 2);
  const iconsHtml = iconList.map(ic=>`<span class="material-symbols-outlined" style="color:${aColor};">${ic}</span>`).join('');
  const tfmMap = {
    n:'translateX(-50%) translateY(-100%)', s:'translateX(-50%)',
    e:'translateY(-50%)', w:'translateX(-100%) translateY(-50%)',
    ne:'translateY(-100%)', nw:'translateX(-100%) translateY(-100%)',
    se:'', sw:'translateX(-100%)',
  };
  const tfm = tfmMap[dir] || tfmMap.s;
  const html = `
    <div style="position:relative;width:0;height:0;">
      <div class="area-label" style="position:absolute;transform:${tfm};border-color:transparent;"
        onmouseenter="this.style.borderColor='${aColor}';this.style.background='rgba(255,255,255,.98)';hoverArea('${area.id}');"
        onmouseleave="this.style.borderColor='transparent';this.style.background='rgba(255,255,255,.95)';unhoverArea('${area.id}');">
        <div class="al-icons">${iconsHtml}</div>
        <div class="al-name">${name}</div>
        ${tag?`<div class="al-tagline">${tag}</div>`:''}
      </div>
    </div>`;
  return L.divIcon({html, className:'', iconSize:[0,0], iconAnchor:[0,0]});
}

// ══════════════════════════════════════════
// POPUP
// ══════════════════════════════════════════
function makePopup(area){
  const t = TR[currentLang];
  const price = area.prices[currentType];
  const color = price !== null ? getColor(price) : '#cccccc';
  const name  = area[currentLang] || area.ko;
  const spots = (currentLang==='ko'?area.sKo:currentLang==='en'?area.sEn:area.sJa)||[];
  const tags  = spots.map(s=>`<span class="pu-tag">${s}</span>`).join('');
  const rows  = Object.entries(area.prices).map(([k,v])=>{
    const active = k===currentType ? 'pu-active' : '';
    const icon = {capsule:'bedroom_parent',hostel:'backpack',budget:'apartment',standard:'hotel',premium:'star',luxury:'diamond'}[k];
    const valHtml = v !== null
      ? `<span class="pu-val">${fmt(v)}<span class="pu-night">${t.perNight}</span></span>`
      : `<span class="pu-na">${t.na}</span>`;
    return `<div class="pu-row ${active}">
      <span class="pu-label"><span class="material-symbols-outlined" style="font-size:15px;">${icon}</span>${t.types[k]}</span>
      ${valHtml}
    </div>`;
  }).join('');
  const q = encodeURIComponent(name + ' hotel Osaka');
  return `<div class="pu-wrap">
    <div class="pu-head">
      <div class="pu-picto" style="background:${color};"><span class="material-symbols-outlined">${area.icon}</span></div>
      <div>
        <div class="pu-name">${name}${area.rec?`<span class="pu-badge">${t.rec}</span>`:''}</div>
        <div class="pu-sub">${t.avgPrice}</div>
      </div>
    </div>
    <div class="pu-tags">${tags}</div>
    <div class="pu-table">${rows}</div>
    <div class="pu-btns">
      <a class="pu-btn pu-google" href="https://www.google.com/maps/search/${q}" target="_blank">
        <span class="material-symbols-outlined" style="font-size:14px;">map</span>Google Maps
      </a>
      <a class="pu-btn pu-booking" href="https://www.booking.com/searchresults.html?ss=${q}" target="_blank">
        <span class="material-symbols-outlined" style="font-size:14px;">hotel</span>Booking
      </a>
    </div>
  </div>`;
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function renderMap(){
  circles.clearLayers();
  connectorLayer.clearLayers();
  markers.clearLayers();
  labelLayer.clearLayers();
  Object.keys(baseCircles).forEach(k=>delete baseCircles[k]);

  AREAS.forEach(area=>{
    if(!LABEL_AREAS.includes(area.id)) return;
    const price      = area.prices[currentType];
    const priceColor = getColor(price);
    const aColor     = AREA_COLORS[area.id] || priceColor;

    const bc = L.circle(area.coords,{
      radius:area.radius||500, color:aColor, fillColor:aColor,
      fillOpacity:.28, weight:3, opacity:.9
    }).bindPopup(()=>makePopup(area),{maxWidth:320,minWidth:280}).addTo(circles);
    baseCircles[area.id] = bc;

    L.marker(area.coords,{icon:makeIcon(area,priceColor)})
      .bindPopup(()=>makePopup(area),{maxWidth:320,minWidth:280})
      .addTo(markers);

    const lo       = LABEL_OFFSETS[area.id] || {off:[0.022,0], dir:'n'};
    const labelPos = [area.coords[0]+lo.off[0], area.coords[1]+lo.off[1]];

    const connector = L.polyline([area.coords, labelPos],{
      color:aColor, weight:2, opacity:.8, dashArray:'5 4'
    }).addTo(connectorLayer);

    L.circleMarker(area.coords,{
      radius:6, color:'#fff', weight:2.5, fillColor:aColor, fillOpacity:1
    }).addTo(connectorLayer);

    const lblMarker = L.marker(labelPos,{
      icon:makeAreaLabel(area, lo.dir),
      zIndexOffset:300,
      draggable:true
    }).addTo(labelLayer);

    lblMarker.on('drag', function(e){
      connector.setLatLngs([area.coords, e.target.getLatLng()]);
    });
  });
}

// ══════════════════════════════════════════
// CONNECTIONS RENDER
// ══════════════════════════════════════════
function renderConnections(){
  subwayLayer.clearLayers();
  AREA_CONNECTIONS.forEach(line=>{
    L.polyline(line.coords,{color:'#fff',weight:line.weight+3,opacity:.55,lineJoin:'round',lineCap:'round'}).addTo(subwayLayer);
    L.polyline(line.coords,{color:line.color,weight:line.weight,opacity:.9,lineJoin:'round',lineCap:'round'})
      .bindTooltip(line[currentLang==='ja'?'ja':currentLang==='en'?'en':'ko'],{sticky:true,direction:'top',className:'subway-tip',offset:[0,-4]})
      .addTo(subwayLayer);
  });
}

// ══════════════════════════════════════════
// SUBWAY LIST
// ══════════════════════════════════════════
function renderSubwayList(){
  const seen = new Set();
  const unique = AREA_CONNECTIONS.filter(l=>{
    if(seen.has(l.ko)) return false;
    seen.add(l.ko); return true;
  });
  document.getElementById('subway-list').innerHTML = unique.map(l=>{
    const m = l.ko.match(/^(.+?)(?:\s*\((.+?)\))?$/);
    const name = m[1], org = m[2]||'';
    return `<div class="sl-item">
      <div class="sl-swatch" style="background:${l.color}"></div>
      <div class="sl-name">${name}${org?`<span class="sl-org">${org}</span>`:''}</div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════
// APPLY LANGUAGE
// ══════════════════════════════════════════
function applyLang(){
  const t = TR[currentLang];
  document.getElementById('h-title').textContent = t.title;
  document.getElementById('h-sub').textContent   = t.sub;
  document.getElementById('h-hint').innerHTML    = t.hint.replace('/','/<br>');
  document.getElementById('sec-type').textContent   = t.secType;
  document.getElementById('sec-legend').textContent = t.secLegend;
  document.getElementById('sec-notes').textContent  = t.secNotes;
  document.getElementById('sec-subway').textContent = t.secSubway;
  Object.keys(t.types).forEach(k=>{ const el=document.getElementById('tn-'+k); if(el) el.textContent=t.types[k]; });
  t.legLabels.forEach((lbl,i)=>{ const el=document.getElementById('ll'+i); if(el) el.textContent=lbl; });
  t.legColors.forEach((lbl,i)=>{ const el=document.getElementById('lc'+i); if(el) el.textContent=lbl; });
  t.notes.forEach((note,i)=>{ const el=document.getElementById('nt'+i); if(el) el.textContent=note; });
  document.getElementById('area-count').textContent = AREAS.length + t.unit;
  document.documentElement.lang = currentLang;
}

// ══════════════════════════════════════════
// CONTROLS
// ══════════════════════════════════════════
function setLang(lang){
  currentLang = lang;
  ['ko','en','ja'].forEach(l=>{ document.getElementById('lang-'+l).classList.toggle('active', l===lang); });
  applyLang();
  renderConnections();
  renderMap();
}

function setType(type){
  currentType = type;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+type).classList.add('active');
  renderMap();
}

function setCur(cur){
  currentCurrency = cur;
  ['JPY','KRW','USD'].forEach(c=>{ document.getElementById('btn-'+c.toLowerCase()).classList.toggle('active', c===cur); });
  updateTypeRanges();
  renderMap();
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
applyLang();
updateTypeRanges();
renderSubwayList();
renderConnections();
renderMap();
</script>
</body>
</html>
